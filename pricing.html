  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

rgb(122,135,160)\">Releventful Pricing<\u002Fspan>\n      <\u002Fdiv>\n\n      <h1 style=\"margin:0;font-family:Lato;font-weight:700;font-size:58px;line-height:1.12;color:rgb(39,51,62)\">Venue management software pricing <span style=\"color:rgb(11,53,88)\">built around the way your team actually works.<\u002Fspan><\u002Fh1>\n\n      <p style=\"margin:0;max-width:820px;font-family:'DM Sans';font-weight:400;font-size:21px;line-height:1.55;color:rgb(81,85,97)\">Releventful starts at $150/month and is built for venues that need more than another calendar, CRM, or payment tool. It helps your team protect leads, move bookings forward, collect payments, organize event details, reduce repetitive questions, and understand what needs attention across the business.<\u002Fp>\n\n      <div style=\"display:flex;flex-direction:row;gap:18px;align-items:center;margin-top:2px\">\n        <a href=\"#\" style=\"display:inline-flex;justify-content:center;align-items:center;padding:20px 34px;border-radius:10px;background:rgb(255,106,43);box-shadow:inset 0 0 0 1px rgb(255,106,43),0 6px 16px rgba(255,106,43,0.28);font-family:Lato;font-weight:700;font-size:20px;color:rgb(255,255,255)\">Book a Demo<\u002Fa>\n        <a href=\"#plans\" style=\"display:inline-flex;justify-content:center;align-items:center;gap:14px;padding:20px 30px;border-radius:10px;background:rgb(255,255,255);box-shadow:inset 0 0 0 1px rgb(231,237,246),0 1px 3px rgba(11,53,88,0.06);font-family:Lato;font-weight:700;font-size:20px;color:rgb(11,53,88)\">Compare Plans <span style=\"font-family:'DM Sans';font-weight:700;color:rgb(255,106,43)\">→<\u002Fspan><\u002Fa>\n      <\u002Fdiv>\n\n      <p style=\"margin:0;max-width:780px;font-family:Lato;font-weight:400;font-size:15px;line-height:1.6;letter-spacing:0.01em;color:rgb(126,141,166)\">Simple starting pricing with AI-assisted workflows included, plus room to grow as your venue needs more advanced workflows, AI capacity, onboarding, or operational depth.<\u002Fp>\n    <\u002Fdiv>\n\n    <!-- right: prominent price card -->\n    <div style=\"position:relative;flex:1;min-width:0;display:flex;justify-content:center\">\n      <div style=\"width:100%;max-width:520px;border-radius:22px;background:linear-gradient(150deg,rgb(11,53,88) 4%,rgb(122,135,160) 96%);padding:44px 42px;box-shadow:0 34px 70px rgba(11,53,88,0.26);display:flex;flex-direction:column;gap:22px\">\n        <span style=\"font-family:Lato;font-weight:700;font-size:14px;letter-spacing:0.08em;text-transform:uppercase;color:rgba(255,255,255,0.72)\">Starts at<\u002Fspan>\n        <div style=\"display:flex;align-items:flex-end;gap:8px\">\n          <span style=\"font-family:Lato;font-weight:900;font-size:96px;line-height:0.9;color:#fff\">$150<\u002Fspan>\n          <span style=\"font-family:'DM Sans';font-weight:500;font-size:26px;color:rgba(255,255,255,0.82);padding-bottom:12px\">/month<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:inline-flex;align-self:flex-start;align-items:center;gap:8px;padding:8px 14px;border-radius:999px;background:rgba(255,255,255,0.14);border:1px solid rgba(255,255,255,0.22)\">\n          <div style=\"width:8px;height:8px;border-radius:50%;background:rgb(255,157,102)\"><\u002Fdiv>\n          <span style=\"font-family:Lato;font-weight:700;font-size:14px;letter-spacing:0.03em;color:#fff\">AI Essentials included on every paid plan<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"height:1px;background:rgba(255,255,255,0.16)\"><\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:12px\">\n          <div style=\"display:flex;align-items:center;gap:12px\"><span style=\"font-family:'DM Sans';font-weight:700;color:rgb(255,157,102)\">✓<\u002Fspan><span style=\"font-family:'DM Sans';font-weight:400;font-size:17px;color:rgb(231,237,246)\">Scales with event volume &amp; team size<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:12px\"><span style=\"font-family:'DM Sans';font-weight:700;color:rgb(255,157,102)\">✓<\u002Fspan><span style=\"font-family:'DM Sans';font-weight:400;font-size:17px;color:rgb(231,237,246)\">Advanced AI expands by plan or add-on<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:12px\"><span style=\"font-family:'DM Sans';font-weight:700;color:rgb(255,157,102)\">✓<\u002Fspan><span style=\"font-family:'DM Sans';font-weight:400;font-size:17px;color:rgb(231,237,246)\">Onboarding &amp; setup options to launch<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ STARTS AT $150 / PRICING TABLE ============ -->\n  <section id=\"plans\" data-screen-label=\"Pricing table\" style=\"position:relative;background:rgb(245,245,244);padding:104px 120px;display:flex;flex-direction:column;gap:52px\">\n    <div style=\"max-width:1040px;display:flex;flex-direction:column;gap:22px\">\n      <h2 style=\"margin:0;font-family:Lato;font-weight:700;font-size:46px;line-height:1.15;color:rgb(39,51,62)\">Starts at $150/month<\u002Fh2>\n      <p style=\"margin:0;font-family:'DM Sans';font-weight:400;font-size:21px;line-height:1.55;color:rgb(81,85,97)\">Releventful gives growing venues a clear starting point while allowing the platform to scale with your team, event volume, operational complexity, and AI needs. Every paid plan includes a baseline layer of Releventful AI Essentials, while more advanced AI capabilities can expand as your business needs more sales support, client and staff self-service, business intelligence, or usage capacity. The right plan depends on how your business manages leads, proposals, contracts, payments, planning, rooms, inventory, staff, BEOs, reporting, and client communication.<\u002Fp>\n      <div style=\"display:inline-flex;align-self:flex-start;align-items:center;gap:10px;padding:8px 14px;border-radius:8px;background:rgb(251,241,223);border:1px solid rgb(238,220,183)\">\n        <div style=\"width:7px;height:7px;border-radius:50%;backgro 37,246),0 10px 40px rgba(11,53,88,0.05);padding:44px 40px;display:flex;flex-direction:column;gap:20px\">\n        <div style=\"width:52px;height:52px;border-radius:14px;background:rgb(230,247,239);display:flex;justify-content:center;align-items:center\"><div style=\"width:20px;height:20px;border-radius:6px;background:rgb(31,174,107)\"><\u002Fdiv><\u002Fdiv>\n        <h3 style=\"margin:0;font-family:Lato;font-weight:700;font-size:26px;line-height:1.2;color:rgb(11,53,88)\">Protect event-day confidence<\u002Fh3>\n        <p style=\"margin:0;font-family:'DM Sans';font-weight:400;font-size:18px;line-height:1.6;color:rgb(81,85,97)\">Rooms, inventory, staffing, BEOs, timelines, documents, and communication need to stay connected. Releventful helps your team keep the operational details organized before event day so fewer issues become urgent at the last minute.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ PRICING VS COST OF LOST TIME ============ -->\n  <section data-screen-label=\"Cost of lost time\" style=\"position:relative;overflow:hidden;background:radial-gradient(1200px 620px at 50% 45%,rgb(11,53,88),rgb(39,51,62));padding:110px 120px;display:flex;flex-direction:column;gap:56px\">\n    <div style=\"position:absolute;inset:0;overflow:hidden;pointer-events:none\">\n      <div style=\"position:absolute;inset:-2px;opacity:0.08;background-image:repeating-linear-gradient(0deg,#fff 0 1px,transparent 1px 94px),repeating-linear-gradient(90deg,#fff 0 1px,transparent 1px 94px)\"><\u002Fdiv>\n      <div style=\"position:absolute;inset:0;background:radial-gradient(1000px 520px at 50% 50%,rgba(11,53,88,0) 40%,rgb(11,53,88) 100%)\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"position:relative;display:flex;flex-direction:row;gap:96px;align-items:flex-start\">\n      <h2 style=\"margin:0;width:820px;flex-shrink:0;font-family:Lato;font-weight:700;font-size:46px;line-height:1.16;color:#fff\">Pricing should be evaluated against the cost of lost time and missed revenue<\u002Fh2>\n      <p style=\"margin:0;flex:1;padding-top:6px;font-family:'DM Sans';font-weight:400;font-size:21px;line-height:1.55;color:rgb(231,237,246)\">The subscription cost is only one part of the value conversation. Venues should also consider the cost of missed leads, inconsistent follow-up, unpaid balances, manual admin, repeated client questions, disconnected room assignments, inventory uncertainty, staffing confusion, and unclear reporting. Releventful is designed to help reduce those hidden costs by giving your team one connected system for the work that drives bookings and event execution.<\u002Fp>\n    <\u002Fdiv>\n    <!-- hidden cost grid -->\n    <div style=\"position:relative;display:grid;grid-template-columns:repeat(4,1fr);gap:18px\">\n      <div style=\"border-radius:16px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);padding:24px 22px;display:flex;flex-direction:column;gap:8px\"><span style=\"font-family:Lato;font-weight:700;font-size:17px;color:#fff\">Missed leads<\u002Fspan><span style=\"font-family:'DM Sans';font-weight:400;font-size:14px;line-height:1.45;color:rgba(231,237,246,0.72)\">Inquiries that never get a timely reply<\u002Fspan><\u002Fdiv>\n      <div style=\"border-radius:16px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);padding:24px 22px;display:flex;flex-direction:column;gap:8px\"><span style=\"font-family:Lato;font-weight:700;font-size:17px;color:#fff\">Manual follow-up<\u002Fspan><span style=\"font-family:'DM Sans';font-weight:400;font-size:14px;line-height:1.45;color:rgba(231,237,246,0.72)\">Hours spent chasing next steps by hand<\u002Fspan><\u002Fdiv>\n      <div style=\"border-radius:16px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);padding:24px 22px;display:flex;flex-direction:column;gap:8px\"><span style=\"font-family:Lato;font-weight:700;font-size:17px;color:#fff\">Unpaid balances<\u002Fspan><span style=\"font-family:'DM Sans';font-weight:400;font-size:14px;line-height:1.45;color:rgba(231,237,246,0.72)\">Deposits and payments that slip past due<\u002Fspan><\u002Fdiv>\n      <div style=\"border-radius:16px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);padding:24px 22px;display:flex;flex-direction:column;gap:8px\"><span style=\"font-family:Lato;font-weight:700;font-size:17px;color:#fff\">Repetitive questions<\u002Fspan><span style=\"font-family:'DM Sans';font-weight:400;font-size:14px;line-height:1.45;color:rgba(231,237,246,0.72)\">The same client asks handled over and over<\u002Fspan><\u002Fdiv>\n      <div style=\"border-radius:16px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);padding:24px 22px;display:flex;flex-direction:column;gap:8px\"><span style=\"font-family:Lato;font-weight:700;font-size:17px;color:#fff\">Room conflicts<\u002Fspan><span style=\"font-family:'DM Sans';font-weight:400;font-size:14px;line-height:1.45;color:rgba(231,237,246,0.72)\">Double bookings and unclear assignments<\u002Fspan><\u002Fdiv>\n      <div style=\"border-radius:16px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);padding:24px 22px;display:flex;flex-direction:column;gap:8px\"><span style=\"font-family:Lato;font-weight:700;font-size:17px;color:#fff\">Inventory uncertainty<\u002Fspan><span style=\"font-family:'DM Sans';font-weight:400;font-size:14px;line-height:1.45;color:rgba(231,237,246,0.72)\">Not knowing what is available for an event<\u002Fspan><\u002Fdiv>\n      <div style=\"border-radius:16px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);padding:24px 22px;display:flex;flex-direction:column;gap:8px\"><span style=\"font-family:Lato;font-weight:700;font-size:17px;color:#fff\">Staffing confusion<\u002Fspan><span style=\"font-family:'DM Sans';font-weight:400;font-size:14px;line-height:1.45;color:rgba(231,237,246,0.72)\">Unclear shifts, tasks, and event coverage<\u002Fspan><\u002Fdiv>\n      <div style=\"border-radius:16px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);padding:24px 22px;display:flex;flex-direction:column;gap:8px\"><span style=\"font-family:Lato;font-weight:700;font-size:17px;color:#fff\">Reporting gaps<\u002Fspan><span style=\"font-family:'DM Sans';font-weight:400;font-size:14px;line-height:1.45;color:rgba(231,237,246,0.72)\">No clear view of sales, revenue, or readiness<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ PAYMENTS ============ -->\n  <section data-screen-label=\"Payments\" style=\"position:relative;background:#fff;padding:104px 120px;display:flex;flex-direction:column;gap:48px\">\n    <div style=\"max-width:1040px;display:flex;flex-direction:column;gap:22px\">\n      <h2 style=\"margin:0;font-family:Lato;font-weight:700;font-size:46px;line-height:1.15;color:rgb(39,51,62)\">Payments that can help venues save money<\u002Fh2>\n      <p style=\"margin:0;font-family:'DM Sans';font-weight:400;font-size:21px;line-height:1.55;color:rgb(81,85,97)\">Releventful supports online invoices, deposits, payment schedules, card payments, and ACH payments. For high-value event payments, ACH can be especially helpful because eligible ACH payments may be capped at $5.<\u002Fp>\n      <p style=\"margin:0;font-family:'DM Sans';font-weight:400;font-size:21px;line-height:1.55;color:rgb(81,85,97)\">Payment processing is part of the total value conversation. Venues should consider not only subscription cost, but also the time and fee savings created by easier payment collection and ACH options.<\u002Fp>\n    <\u002Fdiv>\n\n    <!-- payment savings visual / mini-calculator -->\n    <div style=\"display:flex;flex-direction:row;gap:28px;align-items:stretch\">\n      <div style=\"width:640px;flex-shrink:0;border-radius:20px;background:#fff;box-shadow:inset 0 0 0 1px rgb(231,237,246),0 10px 40px rgba(11,53,88,0.06);padding:40px 44px;display:flex;flex-direction:column;gap:26px\">\n        <div style=\"display:flex;flex-direction:column;gap:6px\">\n          <span style=\"font-family:Lato;font-weight:700;font-size:24px;color:rgb(11,53,88)\">A single event payment<\u002Fspan>\n          <span style=\"font-family:'DM Sans';font-weight:400;font-size:15px;color:rgb(126,141,166)\">Drag to see how the fee changes with the amount.<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:10px\">\n          <div style=\"display:flex;justify-content:space-between;align-items:baseline\"><span style=\"font-family:Lato;font-weight:700;font-size:16px;color:rgb(70,86,110)\">Payment amount<\u002Fspan><span style=\"font-family:'DM Sans';font-weight:700;font-size:20px;color:rgb(11,53,88)\">{{ payLabel }}<\u002Fspan><\u002Fdiv>\n          <input type=\"range\" min=\"500\" max=\"50000\" step=\"500\" value=\"{{ payAmount }}\" oninput=\"{{ onPay }}\">\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:16px\">\n          <div style=\"display:flex;flex-direction:column;gap:8px\">\n            <div style=\"display:flex;justify-content:space-between;align-items:center\"><span style=\"font-family:'DM Sans';font-weight:600;font-size:16px;color:rgb(39,51,62)\">Card payment fee<\u002Fspan><span style=\"font-family:Lato;font-weight:900;font-size:22px;color:rgb(230,162,60)\">{{ cardFeeLabel }}<\u002Fspan><\u002Fdiv>\n            <div style=\"height:14px;border-radius:999px;background:rgb(245,245,244);overflow:hidden\"><div style=\"width:{{ cardBarPct }};height:100%;border-radius:999px;background:rgb(230,162,60)\"><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:8px\">\n            <div style=\"display:flex;justify-content:space-between;align-items:center\"><span style=\"font-family:'DM Sans';font-weight:600;font-size:16px;color:rgb(39,51,62)\">Eligible ACH fee<\u002Fspan><span style=\"font-family:Lato;font-weight:900;font-size:22px;color:rgb(31,174,107)\">{{ achFeeLabel }}<\u002Fspan><\u002Fdiv>\n            <div style=\"height:14px;border-radius:999px;background:rgb(245,245,244);overflow:hidden\"><div style=\"width:{{ achBarPct }};height:100%;border-radius:999px;background:rgb(31,174,107)\"><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:12px;padding:16px 18px;border-radius:14px;background:rgb(230,247,239)\">\n          <span style=\"font-family:Lato;font-weight:900;font-size:26px;color:rgb(19,120,73)\">{{ saveLabel }}<\u002Fspan>\n          <span style=\"font-family:'DM Sans';font-weight:500;font-size:15px;line-height:1.4;color:rgb(19,120,73)\">potential fee difference on this payment when eligible ACH is used<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"flex:1;min-width:0;display:flex;flex-direction:column;gap:20px\">\n        <div style=\"flex:1;border-radius:20px;background:rgb(224,235,251);padding:32px 34px;display:flex;flex-direction:column;justify-content:center;gap:10px\">\n          <span style=\"font-family:Lato;font-weight:700;font-size:14px;letter-spacing:0.06em;text-transform:uppercase;color:rgb(62,143,240)\">Card payments<\u002Fspan>\n          <span style=\"font-family:'DM Sans';font-weight:400;font-size:18px;line-height:1.5;color:rgb(39,51,62)\">Convenient for clients, but fees scale with the size of the transaction — larger event payments carry larger card fees.<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"flex:1;border-radius:20px;background:rgb(230,247,239);padding:32px 34px;display:flex;flex-direction:column;justify-content:center;gap:10px\">\n          <span style=\"font-family:Lato;font-weight:700;font-size:14px;letter-spacing:0.06em;text-transform:uppercase;color:rgb(31,174,107)\">Eligible ACH · capped at $5<\u002Fspan>\n          <span style=\"font-family:'DM Sans';font-weight:400;font-size:18px;line-height:1.5;color:rgb(39,51,62)\">For high-value event payments, eligible ACH may be capped at $5 — a flat fee that does not grow with the payment.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:10px\"><div style=\"width:7px;height:7px;border-radius:50%;background:rgb(122,135,160)\"><\u002Fdiv><span style=\"font-family:'DM Sans';font-weight:400;font-size:15px;color:rgb(126,141,166)\">Figures shown are directional estimates for discussion, not guaranteed results. Published processing rates are confirmed at setup.<\u002Fspan><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ ONBOARDING + AI (two-col) ============ -->\n  <section data-screen-label=\"Onboarding &amp; AI\" style=\"position:relative;background:rgb(245,245,244);padding:104px 120px;display:flex;flex-direction:row;gap:28px;align-items:stretch\">\n    <div style=\"flex:1;border-radius:20px;background:#fff;box-shadow:inset 0 0 0 1px rgb(231,237,246),0 10px 40px rgba(11,53,88,0.05);padding:52px 48px;display:flex;flex-direction:column;gap:22px\">\n      <div style=\"width:52px;height:52px;border-radius:14px;background:rgb(224,235,251);display:flex;justify-content:center;align-items:center\"><div style=\"width:20px;height:20px;border-radius:6px;background:rgb(62,143,240)\"><\u002Fdiv><\u002Fdiv>\n      <h2 style=\"margin:0;font-family:Lato;font-weight:700;font-size:34px;line-height:1.2;color:rgb(11,53,88)\">Onboarding and setup<\u002Fh2>\n      <p style=\"margin:0;font-family:'DM Sans';font-weight:400;font-size:19px;line-height:1.6;color:rgb(81,85,97)\">Moving to a new venue management platform is not just a software decision. It is a workflow decision. Releventful offers onboarding and setup options to help your team configure workflows, migrate important data where applicable, build templates, and launch with confidence.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"flex:1;border-radius:20px;background:#fff;box-shadow:inset 0 0 0 1px rgb(231,237,246),0 10px 40px rgba(11,53,88,0.05);padding:52px 48px;display:flex;flex-direction:column;gap:22px\">\n      <div style=\"width:52px;height:52px;border-radius:14px;background:linear-gradient(120deg,rgb(11,53,88) 7%,rgb(122,135,160) 92%);display:flex;justify-content:center;align-items:center\"><span style=\"font-family:Lato;font-weight:900;font-size:22px;color:#fff\">R<\u002Fspan><\u002Fdiv>\n      <h2 style=\"margin:0;font-family:Lato;font-weight:700;font-size:34px;line-height:1.2;color:rgb(11,53,88)\">AI and advanced workflow options<\u002Fh2>\n      <p style=\"margin:0;font-family:'DM Sans';font-weight:400;font-size:19px;line-height:1.6;color:rgb(81,85,97)\">Releventful AI can help teams respond faster, reduce repetitive questions, and understand what needs attention. AI is built into the platform, not sold as three disconnected products. Releventful AI Essentials is included in every paid plan, with advanced capabilities expanding by plan level, usage capacity, or add-on. AI Sales Assist can begin with basic drafts, summaries, and next-step support, then expand for higher sales usage and follow-up needs. Rae can begin with limited or internal question-answering, while client-facing Rae, staff-facing Rae, and higher usage can belong in higher plans or add-ons. Venue Intelligence can begin with basic attention prompts, while advanced business questions, reporting intelligence, and operational insights can belong in higher plans.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ FINAL CTA ============ -->\n  <section data-screen-label=\"Final CTA\" style=\"position:relative;background:#fff;padding:110px 120px\">\n    <div style=\"position:relative;overflow:hidden;border-radius:20px;background:linear-gradient(102deg,rgb(11,53,88) 2%,rgb(122,135,160) 98%);padding:110px 40px;display:flex;flex-direction:column;gap:40px;justify-content:center;align-items:center\">\n      <div style=\"position:absolute;inset:0;overflow:hidden;pointer-events:none\">\n        <div style=\"position:absolute;inset:-2px;opacity:0.08;background-image:repeating-linear-gradient(0deg,#fff 0 1.5px,transparent 1.5px 94px),repeating-linear-gradient(90deg,#fff 0 1.5px,transparent 1.5px 94px)\"><\u002Fdiv>\n        <div style=\"position:absolute;left:281px;top:95px;width:92px;height:92px;background:rgba(255,255,255,0.15)\"><\u002Fdiv>\n        <div style=\"position:absolute;right:230px;top:280px;width:92px;height:92px;background:rgba(255,157,102,0.1)\"><\u002Fdiv>\n        <div style=\"position:absolute;left:845px;bottom:20px;width:92px;height:92px;background:rgba(255,255,255,0.12)\"><\u002Fdiv>\n        <div style=\"position:absolute;inset:0;background:radial-gradient(966px 314px at 50% 50%,rgba(11,53,88,0) 36%,rgb(11,53,88) 100%);opacity:0.8\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"position:relative;display:flex;flex-direction:column;gap:16px;align-items:center;max-width:1100px\">\n        <h2 style=\"margin:0;text-align:center;font-family:Lato;font-weight:700;font-size:52px;line-height:1.12;color:#fff\">Find the right Releventful plan for your venue<\u002Fh2>\n        <p style=\"margin:0;text-align:center;max-width:960px;font-family:'DM Sans';font-weight:400;font-size:23px;line-height:1.5;color:rgb(231,237,246)\">Book a demo and we will walk through your event volume, team structure, payments, room management, inventory needs, staffing workflows, reporting goals, AI opportunities, and savings potential to recommend the right setup.<\u002Fp>\n      <\u002Fdiv>\n      <a href=\"#\" style=\"position:relative;display:inline-flex;justify-content:center;align-items:center;padding:22px 40px;border-radius:10px;background:rgb(255,106,43);box-shadow:inset 0 0 0 1px rgb(255,106,43),0 6px 16px rgba(255,106,43,0.32);font-family:Lato;font-weight:700;font-size:20px;color:#fff\">Book a Demo<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ FAQ ============ -->\n  <section data-screen-label=\"FAQ\" style=\"position:relative;background:rgb(245,245,244);padding:104px 120px;display:flex;flex-direction:column;gap:48px\">\n    <div style=\"max-width:900px;display:flex;flex-direction:column;gap:16px\">\n      <div style=\"display:inline-flex;align-self:flex-start;flex-direction:row;gap:9px;padding:7px 13px;align-items:center;border-radius:999px;background:#fff;border:1px solid rgb(231,237,246)\"><div style=\"width:7px;height:7px;border-radius:50%;background:rgb(122,135,160)\"><\u002Fdiv><span style=\"font-family:Lato;font-weight:400;font-size:14px;letter-spacing:0.04em;text-transform:uppercase;color:rgb(122,135,160)\">Frequently asked<\u002Fspan><\u002Fdiv>\n      <h2 style=\"margin:0;font-family:Lato;font-weight:700;font-size:46px;line-height:1.15;color:rgb(39,51,62)\">Pricing questions, answered<\u002Fh2>\n    <\u002Fdiv>\n\n    <div style=\"display:flex;flex-direction:column;gap:14px;max-width:1160px;margin:0 auto;width:100%\">\n      <details class=\"faq\" style=\"border-radius:16px;background:#fff;box-shadow:inset 0 0 0 1px rgb(231,237,246);overflow:hidden\">\n        <summary style=\"display:flex;justify-content:space-between;align-items:center;gap:20px;padding:26px 30px\"><span style=\"font-family:Lato;font-weight:700;font-size:20px;color:rgb(11,53,88)\">How much does Releventful cost?<\u002Fspan><span class=\"faq-plus\" style=\"font-family:'DM Sans';font-weight:400;font-size:28px;color:rgb(255,106,43);flex-shrink:0;line-height:1\">+<\u002Fspan><\u002Fsummary>\n        <div style=\"padding:0 30px 28px 30px\"><p style=\"margin:0;max-width:940px;font-family:'DM Sans';font-weight:400;font-size:18px;line-height:1.6;color:rgb(81,85,97)\">Releventful starts at $150/month. The right plan depends on your venue’s event volume, team structure, feature needs, AI usage, onboarding needs, payment workflows, room management, inventory, employee scheduling, reporting, and setup requirements.<\u002Fp><\u002Fdiv>\n      <\u002Fdetails>\n      <details class=\"faq\" style=\"border-radius:16px;background:#fff;box-shadow:inset 0 0 0 1px rgb(231,237,246);overflow:hidden\">\n        <summary style=\"display:flex;justify-content:space-between;align-items:center;gap:20px;padding:26px 30px\"><span style=\"font-family:Lato;font-weight:700;font-size:20px;color:rgb(11,53,88)\">What is venue management software pricing based on?<\u002Fspan><span class=\"faq-plus\" style=\"font-family:'DM Sans';font-weight:400;font-size:28px;color:rgb(255,106,43);flex-shrink:0;line-height:1\">+<\u002Fspan><\u002Fsummary>\n        <div style=\"padding:0 30px 28px 30px\"><p style=\"margin:0;max-width:940px;font-family:'DM Sans';font-weight:400;font-size:18px;line-height:1.6;color:rgb(81,85,97)\">Venue management software pricing is typically based on the size of the business, number of users or locations, feature needs, onboarding requirements, payment workflows, and whether advanced tools such as AI, inventory, room management, employee scheduling, or reporting are included.<\u002Fp><\u002Fdiv>\n      <\u002Fdetails>\n      <details class=\"faq\" style=\"border-radius:16px;background:#fff;box-shadow:inset 0 0 0 1px rgb(231,237,246);overflow:hidden\">\n        <summary style=\"display:flex;justify-content:space-between;align-items:center;gap:20px;padding:26px 30px\"><span style=\"font-family:Lato;font-weight:700;font-size:20px;color:rgb(11,53,88)\">What is included in Releventful venue management software?<\u002Fspan><span class=\"faq-plus\" style=\"font-family:'DM Sans';font-weight:400;font-size:28px;color:rgb(255,106,43);flex-shrink:0;line-height:1\">+<\u002Fspan><\u002Fsummary>\n        <div style=\"padding:0 30px 28px 30px\"><p style=\"margin:0;max-width:940px;font-family:'DM Sans';font-weight:400;font-size:18px;line-height:1.6;color:rgb(81,85,97)\">Releventful can support venue lead management, proposals, contracts, invoices, payment schedules, client portal workflows, planning forms, BEOs, timelines, room management, inventory tracking, employee scheduling, SMS and email communication, reporting, and AI-powered tools depending on the selected plan.<\u002Fp><\u002Fdiv>\n      <\u002Fdetails>\n      <details class=\"faq\" style=\"border-radius:16px;background:#fff;box-shadow:inset 0 0 0 1px rgb(231,237,246);overflow:hidden\">\n        <summary style=\"display:flex;justify-content:space-between;align-items:center;gap:20px;padding:26px 30px\"><span style=\"font-family:Lato;font-weight:700;font-size:20px;color:rgb(11,53,88)\">Is Releventful suitable for small venues?<\u002Fspan><span class=\"faq-plus\" style=\"font-family:'DM Sans';font-weight:400;font-size:28px;color:rgb(255,106,43);flex-shrink:0;line-height:1\">+<\u002Fspan><\u002Fsummary>\n        <div style=\"padding:0 30px 28px 30px\"><p style=\"margin:0;max-width:940px;font-family:'DM Sans';font-weight:400;font-size:18px;line-height:1.6;color:rgb(81,85,97)\">Yes. Releventful can support smaller venues that want to replace spreadsheets, manual follow-up, separate payment tools, and scattered event details with one organized venue management platform.<\u002Fp><\u002Fdiv>\n      <\u002Fdetails>\n      <details class=\"faq\" style=\"border-radius:16px;background:#fff;box-shadow:inset 0 0 0 1px rgb(231,237,246);overflow:hidden\">\n        <summary style=\"display:flex;justify-content:space-between;align-items:center;gap:20px;padding:26px 30px\"><span style=\"font-family:Lato;font-weight:700;font-size:20px;color:rgb(11,53,88)\">Is Releventful suitable for larger venues or multi-room properties?<\u002Fspan><span class=\"faq-plus\" style=\"font-family:'DM Sans';font-weight:400;font-size:28px;color:rgb(255,106,43);flex-shrink:0;line-height:1\">+<\u002Fspan><\u002Fsummary>\n        <div style=\"padding:0 30px 28px 30px\"><p style=\"margin:0;max-width:940px;font-family:'DM Sans';font-weight:400;font-size:18px;line-height:1.6;color:rgb(81,85,97)\">Yes. Releventful supports operational workflows such as room management, event space assignments, staff scheduling, inventory, BEOs, reporting, and team visibility, which are important for larger venues and multi-room properties.<\u002Fp><\u002Fdiv>\n      <\u002Fdetails>\n      <details class=\"faq\" style=\"border-radius:16px;background:#fff;box-shadow:inset 0 0 0 1px rgb(231,237,246);overflow:hidden\">\n        <summary style=\"display:flex;justify-content:space-between;align-items:center;gap:20px;padding:26px 30px\"><span style=\"font-family:Lato;font-weight:700;font-size:20px;color:rgb(11,53,88)\">Does Releventful include venue booking software?<\u002Fspan><span class=\"faq-plus\" style=\"font-family:'DM Sans';font-weight:400;font-size:28px;color:rgb(255,106,43);flex-shrink:0;line-height:1\">+<\u002Fspan><\u002Fsummary>\n        <div style=\"padding:0 30px 28px 30px\"><p style=\"margin:0;max-width:940px;font-family:'DM Sans';font-weight:400;font-size:18px;line-height:1.6;color:rgb(81,85,97)\">Yes. Releventful includes venue booking workflows that help teams manage inquiries, sales stages, proposals, contracts, deposits, payment schedules, event records, client communication, rooms, and event-day details.<\u002Fp><\u002Fdiv>\n      <\u002Fdetails>\n      <details class=\"faq\" style=\"border-radius:16px;background:#fff;box-shadow:inset 0 0 0 1px rgb(231,237,246);overflow:hidden\">\n        <summary style=\"display:flex;justify-content:space-between;align-items:center;gap:20px;padding:26px 30px\"><span style=\"font-family:Lato;font-weight:700;font-size:20px;color:rgb(11,53,88)\">Does Releventful include wedding venue software?<\u002Fspan><span class=\"faq-plus\" style=\"font-family:'DM Sans';font-weight:400;font-size:28px;color:rgb(255,106,43);flex-shrink:0;line-height:1\">+<\u002Fspan><\u002Fsummary>\n        <div style=\"padding:0 30px 28px 30px\"><p style=\"margin:0;max-width:940px;font-family:'DM Sans';font-weight:400;font-size:18px;line-height:1.6;color:rgb(81,85,97)\">Yes. Releventful supports wedding venues with tools for inquiries, tours, proposals, contracts, payment schedules, planning forms, client portal access, timelines, BEOs, documents, rooms, inventory, staffing, and reporting.<\u002Fp><\u002Fdiv>\n      <\u002Fdetails>\n      <details class=\"faq\" style=\"border-radius:16px;background:#fff;box-shadow:inset 0 0 0 1px rgb(231,237,246);overflow:hidden\">\n        <summary style=\"display:flex;justify-content:space-between;align-items:center;gap:20px;padding:26px 30px\"><span style=\"font-family:Lato;font-weight:700;font-size:20px;color:rgb(11,53,88)\">Does Releventful support employee scheduling?<\u002Fspan><span class=\"faq-plus\" style=\"font-family:'DM Sans';font-weight:400;font-size:28px;color:rgb(255,106,43);flex-shrink:0;line-height:1\">+<\u002Fspan><\u002Fsummary>\n        <div style=\"padding:0 30px 28px 30px\"><p style=\"margin:0;max-width:940px;font-family:'DM Sans';font-weight:400;font-size:18px;line-height:1.6;color:rgb(81,85,97)\">Yes. Releventful supports employee scheduling and event team workflows, including team visibility into shift details, assigned tasks, and event information depending on configuration.<\u002Fp><\u002Fdiv>\n      <\u002Fdetails>\n      <details class=\"faq\" style=\"border-radius:16px;background:#fff;box-shadow:inset 0 0 0 1px rgb(231,237,246);overflow:hidden\">\n        <summary style=\"display:flex;justify-content:space-between;align-items:center;gap:20px;padding:26px 30px\"><span style=\"font-family:Lato;font-weight:700;font-size:20px;color:rgb(11,53,88)\">Does Releventful support inventory tracking for events?<\u002Fspan><span class=\"faq-plus\" style=\"font-family:'DM Sans';font-weight:400;font-size:28px;color:rgb(255,106,43);flex-shrink:0;line-height:1\">+<\u002Fspan><\u002Fsummary>\n        <div style=\"padding:0 30px 28px 30px\"><p style=\"margin:0;max-width:940px;font-family:'DM Sans';font-weight:400;font-size:18px;line-height:1.6;color:rgb(81,85,97)\">Yes. Releventful supports inventory tracking for items such as equipment, furniture, resources, add-ons, packages, and operational supplies so teams can better understand availability and event assignments.<\u002Fp><\u002Fdiv>\n      <\u002Fdetails>\n      <details class=\"faq\" style=\"border-radius:16px;background:#fff;box-shadow:inset 0 0 0 1px rgb(231,237,246);overflow:hidden\">\n        <summary style=\"display:flex;justify-content:space-between;align-items:center;gap:20px;padding:26px 30px\"><span style=\"font-family:Lato;font-weight:700;font-size:20px;color:rgb(11,53,88)\">Does Releventful support room bookings?<\u002Fspan><span class=\"faq-plus\" style=\"font-family:'DM Sans';font-weight:400;font-size:28px;color:rgb(255,106,43);flex-shrink:0;line-height:1\">+<\u002Fspan><\u002Fsummary>\n        <div style=\"padding:0 30px 28px 30px\"><p style=\"margin:0;max-width:940px;font-family:'DM Sans';font-weight:400;font-size:18px;line-height:1.6;color:rgb(81,85,97)\">Yes. Releventful supports room and event space management so venues can organize room assignments, availability, event-specific details, and multi-room event workflows.<\u002Fp><\u002Fdiv>\n      <\u002Fdetails>\n      <details class=\"faq\" style=\"border-radius:16px;background:#fff;box-shadow:inset 0 0 0 1px rgb(231,237,246);overflow:hidden\">\n        <summary style=\"display:flex;justify-content:space-between;align-items:center;gap:20px;padding:26px 30px\"><span style=\"font-family:Lato;font-weight:700;font-size:20px;color:rgb(11,53,88)\">Does Releventful include AI?<\u002Fspan><span class=\"faq-plus\" style=\"font-family:'DM Sans';font-weight:400;font-size:28px;color:rgb(255,106,43);flex-shrink:0;line-height:1\">+<\u002Fspan><\u002Fsummary>\n        <div style=\"padding:0 30px 28px 30px\"><p style=\"margin:0;max-width:940px;font-family:'DM Sans';font-weight:400;font-size:18px;line-height:1.6;color:rgb(81,85,97)\">Yes. Every paid Releventful plan should include Releventful AI Essentials as a baseline layer of AI-assisted workflows. Advanced capabilities for AI Sales Assist, Rae by Releventful, and Venue Intelligence may vary by plan, usage capacity, configuration, or add-on.<\u002Fp><\u002Fdiv>\n      <\u002Fdetails>\n      <details class=\"faq\" style=\"border-radius:16px;background:#fff;box-shadow:inset 0 0 0 1px rgb(231,237,246);overflow:hidden\">\n        <summary style=\"display:flex;justify-content:space-between;align-items:center;gap:20px;padding:26px 30px\"><span style=\"font-family:Lato;font-weight:700;font-size:20px;color:rgb(11,53,88)\">What is Releventful AI Essentials?<\u002Fspan><span class=\"faq-plus\" style=\"font-family:'DM Sans';font-weight:400;font-size:28px;color:rgb(255,106,43);flex-shrink:0;line-height:1\">+<\u002Fspan><\u002Fsummary>\n        <div style=\"padding:0 30px 28px 30px\"><p style=\"margin:0;max-width:940px;font-family:'DM Sans';font-weight:400;font-size:18px;line-height:1.6;color:rgb(81,85,97)\">Releventful AI Essentials is the baseline AI layer included in every paid plan. It can include limited AI-assisted workflows such as summaries, basic AI Sales Assist support, limited question-answering, and simple prompts that help teams see what needs attention.<\u002Fp><\u002Fdiv>\n      <\u002Fdetails>\n      <details class=\"faq\" style=\"border-radius:16px;background:#fff;box-shadow:inset 0 0 0 1px rgb(231,237,246);overflow:hidden\">\n        <summary style=\"display:flex;justify-content:space-between;align-items:center;gap:20px;padding:26px 30px\"><span style=\"font-family:Lato;font-weight:700;font-size:20px;color:rgb(11,53,88)\">Do I have to pay separately for AI Sales Assist, Rae, and Venue Intelligence?<\u002Fspan><span class=\"faq-plus\" style=\"font-family:'DM Sans';font-weight:400;font-size:28px;color:rgb(255,106,43);flex-shrink:0;line-height:1\">+<\u002Fspan><\u002Fsummary>\n        <div style=\"padding:0 30px 28px 30px\"><p style=\"margin:0;max-width:940px;font-family:'DM Sans';font-weight:400;font-size:18px;line-height:1.6;color:rgb(81,85,97)\">Not necessarily. The pricing page should package AI by plan level and usage need. Customers should be able to start with included AI Essentials and upgrade when they need more advanced sales support, client-facing Rae, staff-facing Rae, deeper Venue Intelligence, or higher usage capacity.<\u002Fp><\u002Fdiv>\n      <\u002Fdetails>\n      <details class=\"faq\" style=\"border-radius:16px;background:#fff;box-shadow:inset 0 0 0 1px rgb(231,237,246);overflow:hidden\">\n        <summary style=\"display:flex;justify-content:space-between;align-items:center;gap:20px;padding:26px 30px\"><span style=\"font-family:Lato;font-weight:700;font-size:20px;color:rgb(11,53,88)\">Can clients pay by ACH?<\u002Fspan><span class=\"faq-plus\" style=\"font-family:'DM Sans';font-weight:400;font-size:28px;color:rgb(255,106,43);flex-shrink:0;line-height:1\">+<\u002Fspan><\u002Fsummary>\n        <div style=\"padding:0 30px 28px 30px\"><p style=\"margin:0;max-width:940px;font-family:'DM Sans';font-weight:400;font-size:18px;line-height:1.6;color:rgb(81,85,97)\">Yes. Releventful supports ACH payments where available, along with card payments and other payment workflows. ACH can be valuable for larger event payments because eligible ACH payments may be capped at $5.<\u002Fp><\u002Fdiv>\n      <\u002Fdetails>\n      <details class=\"faq\" style=\"border-radius:16px;background:#fff;box-shadow:inset 0 0 0 1px rgb(231,237,246);overflow:hidden\">\n        <summary style=\"display:flex;justify-content:space-between;align-items:center;gap:20px;padding:26px 30px\"><span style=\"font-family:Lato;font-weight:700;font-size:20px;color:rgb(11,53,88)\">Can Releventful help transfer data from another system?<\u002Fspan><span class=\"faq-plus\" style=\"font-family:'DM Sans';font-weight:400;font-size:28px;color:rgb(255,106,43);flex-shrink:0;line-height:1\">+<\u002Fspan><\u002Fsummary>\n        <div style=\"padding:0 30px 28px 30px\"><p style=\"margin:0;max-width:940px;font-family:'DM Sans';font-weight:400;font-size:18px;line-height:1.6;color:rgb(81,85,97)\">Releventful offers onboarding and data migration services depending on the project scope, source system, data quality, and selected setup package.<\u002Fp><\u002Fdiv>\n      <\u002Fdetails>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FOOTER -->\n  <x-import component-from-global-scope=\"Footer\" from=\"c9de85f6-f444-4d00-8f6b-be415d0a15af#/Components.bundle.js\" hint-size=\"1920px,600px\" style=\"display:block;width:100%\"><\u002Fx-import>\n\n<\u002Fdiv>\n\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1920,&quot;height&quot;:1040},&quot;cardRatePct&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:2.9,&quot;min&quot;:1,&quot;max&quot;:4,&quot;step&quot;:0.1,&quot;unit&quot;:&quot;%&quot;,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Payments illustration&quot;},&quot;achCap&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:5,&quot;min&quot;:1,&quot;max&quot;:25,&quot;unit&quot;:&quot;$&quot;,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Payments illustration&quot;}}\">\nclass Component extends DCLogic {\n  state = { payAmount: 12000 };\n\n  renderVals() {\n    const amt = this.state.payAmount;\n    const cardRate = (this.props.cardRatePct ?? 2.9) / 100;\n    const achCap = this.props.achCap ?? 5;\n\n    const money = n => '$' + Math.round(n).toLocaleString('en-US');\n    const cardFee = amt * cardRate;\n    const achFee = Math.min(achCap, cardFee);\n    const maxFee = 50000 * cardRate; // scale bars against largest card fee\n    const pct = v => Math.max(2, Math.min(100, (v / maxFee) * 100)) + '%';\n\n    return {\n      payAmount: amt,\n      payLabel: money(amt),\n      cardFeeLabel: money(cardFee),\n      achFeeLabel: money(achFee),\n      saveLabel: money(Math.max(0, cardFee - achFee)),\n      cardBarPct: pct(cardFee),\n      achBarPct: pct(achFee),\n      onPay: e => this.setState({ payAmount: Number(e.target.value) }),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
