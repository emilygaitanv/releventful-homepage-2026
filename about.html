document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

     <div style=\"display:flex;flex-direction:column;gap:10px\">\n            <div style=\"display:flex;align-items:center;gap:10px\"><span style=\"width:8px;height:8px;border-radius:50%;background:rgb(255,106,43);flex-shrink:0\"><\u002Fspan><span style=\"font-family:'DM Sans';font-weight:400;font-size:14px;color:rgb(81,85,97)\">3 leads awaiting a first reply<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:10px\"><span style=\"width:8px;height:8px;border-radius:50%;background:rgb(230,162,60);flex-shrink:0\"><\u002Fspan><span style=\"font-family:'DM Sans';font-weight:400;font-size:14px;color:rgb(81,85,97)\">2 deposits due this week<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:10px\"><span style=\"width:8px;height:8px;border-radius:50%;background:rgb(31,174,107);flex-shrink:0\"><\u002Fspan><span style=\"font-family:'DM Sans';font-weight:400;font-size:14px;color:rgb(81,85,97)\">Grand Hall BEO confirmed<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- floating stat chip -->\n        <div style=\"position:absolute;left:-34px;top:40px;display:inline-flex;align-items:center;gap:10px;padding:12px 16px;border-radius:14px;background:#fff;box-shadow:0 18px 40px rgba(11,53,88,0.18),inset 0 0 0 1px rgb(231,237,246)\">\n          <div style=\"width:34px;height:34px;border-radius:10px;background:rgb(224,235,251);display:flex;justify-content:center;align-items:center\"><div style=\"width:14px;height:14px;border-radius:5px;background:rgb(62,143,240)\"><\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column\"><span style=\"font-family:Lato;font-weight:700;font-size:16px;color:rgb(11,53,88)\">One connected platform<\u002Fspan><span style=\"font-family:'DM Sans';font-weight:400;font-size:13px;color:rgb(126,141,166)\">from inquiry to follow-up<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ WHY RELEVENTFUL EXISTS ============ -->\n  <section data-screen-label=\"Why we exist\" style=\"position:relative;background:rgb(245,245,244);padding:104px 120px;display:flex;flex-direction:row;gap:96px;align-items:flex-start\">\n    <div style=\"width:640px;flex-shrink:0;display:flex;flex-direction:column;gap:28px\">\n      <h2 style=\"margin:0;font-family:Lato;font-weight:700;font-size:46px;line-height:1.15;color:rgb(39,51,62)\">Why Releventful exists<\u002Fh2>\n      <!-- scattered tools -> connected infographic -->\n      <div style=\"display:flex;flex-direction:column;gap:16px;border-radius:20px;background:#fff;box-shadow:inset 0 0 0 1px rgb(231,237,246),0 10px 40px rgba(11,53,88,0.05);padding:30px 32px\">\n        <span style=\"font-family:Lato;font-weight:700;font-size:14px;letter-spacing:0.06em;text-transform:uppercase;color:rgb(122,135,160)\">Before<\u002Fspan>\n        <div style=\"display:flex;flex-wrap:wrap;gap:9px\">\n          <span style=\"font-family:'DM Sans';font-weight:500;font-size:14px;color:rgb(70,86,110);padding:8px 13px;border-radius:9px;background:rgb(245,245,244);border:1px dashed rgb(215,224,239)\">Spreadsheets<\u002Fspan>\n          <span style=\"font-family:'DM Sans';font-weight:500;font-size:14px;color:rgb(70,86,110);padding:8px 13px;border-radius:9px;background:rgb(245,245,244);border:1px dashed rgb(215,224,239)\">Disconnected calendars<\u002Fspan>\n          <span style=\"font-family:'DM Sans';font-weight:500;font-size:14px;color:rgb(70,86,110);padding:8px 13px;border-radius:9px;background:rgb(245,245,244);border:1px dashed rgb(215,224,239)\">Manual reminders<\u002Fspan>\n          <span style=\"font-family:'DM Sans';font-weight:500;font-size:14px;color:rgb(70,86,110);padding:8px 13px;border-radius:9px;background:rgb(245,245,244);border:1px dashed rgb(215,224,239)\">Editable PDFs<\u002Fspan>\n          <span style=\"font-family:'DM Sans';font-weight:500;font-size:14px;color:rgb(70,86,110);padding:8px 13px;border-radius:9px;background:rgb(245,245,244);border:1px dashed rgb(215,224,239)\">Inbox searches<\u002Fspan>\n          <span style=\"font-family:'DM Sans';font-weight:500;font-size:14px;color:rgb(70,86,110);padding:8px 13px;border-radius:9px;background:rgb(245,245,244);border:1px dashed rgb(215,224,239)\">Repeated questions<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;justify-content:center;align-items:center;padding:4px 0\"><span style=\"font-family:'DM Sans';font-weight:700;font-size:22px;color:rgb(255,106,43)\">↓<\u002Fspan><\u002Fdiv>\n        <span style=\"font-family:Lato;font-weight:700;font-size:14px;letter-spacing:0.06em;text-transform:uppercase;color:rgb(122,135,160)\">With Releventful<\u002Fspan>\n        <div style=\"display:flex;align-items:center;gap:12px;padding:16px 18px;border-radius:12px;background:linear-gradient(120deg,rgb(11,53,88) 7%,rgb(122,135,160) 92%)\">\n          <div style=\"width:34px;height:34px;border-radius:10px;background:rgba(255,255,255,0.16);display:flex;justify-content:center;align-items:center;flex-shrink:0\"><span style=\"font-family:Lato;font-weight:900;font-size:16px;color:#fff\">✦<\u002Fspan><\u002Fdiv>\n          <span style=\"font-family:Lato;font-weight:700;font-size:17px;color:#fff\">One connected system for the whole venue<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex:1;display:flex;flex-direction:column;gap:24px;padding-top:6px\">\n      <p style=\"margin:0;font-family:'DM Sans';font-weight:400;font-size:21px;line-height:1.55;color:rgb(81,85,97)\">Running a venue is not simple. A single event can involve leads, tours, proposals, contracts, payments, rooms, inventory, staff, BEOs, timelines, documents, forms, messages, and last-minute changes.<\u002Fp>\n      <p style=\"margin:0;font-family:'DM Sans';font-weight:400;font-size:21px;line-height:1.55;color:rgb(81,85,97)\">When those details live in different places, your team loses time. Leads go cold. Payments get chased manually. Clients ask the same questions. Staff search for the latest information. Owners struggle to know what needs attention.<\u002Fp>\n      <p style=\"margin:0;font-family:'DM Sans';font-weight:400;font-size:21px;line-height:1.55;color:rgb(81,85,97)\">Releventful exists to guide venue and hospitality event teams toward a better way to work: one connected system where sales, planning, operations, payments, reporting, and AI-powered support work together.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ BUILT WITH OPERATIONAL DEPTH ============ -->\n  <section data-screen-label=\"Operational depth\" style=\"position:relative;background:#fff;padding:104px 120px;display:flex;flex-direction:row;gap:80px;align-items:center\">\n    <div style=\"width:760px;flex-shrink:0;display:flex;flex-direction:column;gap:26px\">\n      <h2 style=\"margin:0;font-family:Lato;font-weight:700;font-size:46px;line-height:1.15;color:rgb(39,51,62)\">Built with operational depth<\u002Fh2>\n      <p style=\"margin:0;font-family:'DM Sans';font-weight:400;font-size:21px;line-height:1.55;color:rgb(81,85,97)\">Releventful is not just a CRM and not just an AI chatbot. It is a venue management platform that supports the work behind the booking: sales, proposals, contracts, payments, planning, rooms, inventory, employee scheduling, BEOs, communication, reporting, and AI-powered support.<\u002Fp>\n      <p style=\"margin:0;font-family:'DM Sans';font-weight:400;font-size:21px;line-height:1.55;color:rgb(81,85,97)\">For venues and event teams, that operational depth matters. A booking is not complete just because a lead replied. The proposal needs to be right. The contract needs to be signed. The deposit needs to be collected. The room needs to be available. Inventory needs to be understood. Staff need to know what to do. The BEO needs to be accurate. Owners need visibility into what is happening.<\u002Fp>\n    <\u002Fdiv>\n\n    <!-- connected workflow board -->\n    <div style=
