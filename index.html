  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 style=\"font-size:13px; color:rgba(231,237,246,.5);\">© 2026 Releventful. All rights reserved.<\u002Fspan>\n        <div style=\"display:flex; gap:22px;\">\n          <a href=\"#\" style=\"text-decoration:none; color:rgba(231,237,246,.5); font-size:13px;\">Privacy<\u002Fa>\n          <a href=\"#\" style=\"text-decoration:none; color:rgba(231,237,246,.5); font-size:13px;\">Terms<\u002Fa>\n          <a href=\"#\" style=\"text-decoration:none; color:rgba(231,237,246,.5); font-size:13px;\">Security<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;heroVariant&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Split composite&quot;,&quot;Product-forward&quot;,&quot;Editorial&quot;],&quot;default&quot;:&quot;Split composite&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;brandOrange&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#FF6A2B&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;aiAccent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#7A5CFF&quot;,&quot;tsType&quot;:&quot;string&quot;}}\">\nclass Component extends DCLogic {\n  state = { openFaq: 0, stage: 0 };\n  componentDidMount(){ this.applyTokens(); }\n  componentDidUpdate(){ this.applyTokens(); }\n  applyTokens(){\n    const r = document.documentElement;\n    if (this.props.brandOrange) r.style.setProperty('--brand', this.props.brandOrange);\n    if (this.props.aiAccent) r.style.setProperty('--ai-from', this.props.aiAccent);\n  }\n  renderVals(){\n    const v = this.props.heroVariant || 'Split composite';\n    const faqData = [\n      { q:'What is Releventful?', a:'Releventful is an AI-powered venue management platform that connects sales, planning, operations, and reporting in one workspace — from first inquiry to final follow-up.' },\n      { q:'Who is Releventful built for?', a:'Wedding venues, event venues, banquet halls, hospitality venues, caterers, and private event teams that need more than a calendar, CRM, or chatbot.' },\n      { q:'How does Releventful AI help venue teams?', a:'Releventful AI drafts replies, summarizes conversations, answers the repetitive questions clients and staff ask, and surfaces the priorities that need attention — using information already inside Releventful. Your team always reviews and approves.' },\n      { q:'Can Releventful replace multiple tools?', a:'Yes. Lead management, communication, proposals, contracts, payments, planning, BEOs, rooms, inventory, staffing, and reporting all live in one connected platform.' },\n    ];\n    const faqList = faqData.map((it, i) => ({\n      q: it.q, a: it.a, open: this.state.openFaq === i,\n      onClick: () => this.setState(s => ({ openFaq: s.openFaq === i ? -1 : i })),\n    }));\n    const stageData = [\n      { label:'Inquiry', icon:'📨', title:'Capture and qualify every inquiry', desc:'New leads need fast replies. Releventful captures every inquiry the moment it arrives and keeps follow-up on track.', metric:'23', metricLabel:'New leads this week', rows:[{t:'Jordan M. · Sept 14 wedding', s:'New · 2h ago', dot:'var(--amber)'},{t:'Avery T. · 120-guest gala', s:'New · 5h ago', dot:'var(--amber)'}], caps:['Lead management & pipeline','Email & SMS communication'] },\n      { label:'Tour', icon:'🚶', title:'Schedule and run venue tours', desc:'Turn interest into booked tours with shared calendars, room availability, and automated reminders.', metric:'8', metricLabel:'Tours scheduled this week', rows:[{t:'Sasha P. · Grand Hall tour', s:'Thu 2:00 PM', dot:'var(--ai-to)'},{t:'Liam R. · Garden Terrace', s:'Fri 11:00 AM', dot:'var(--ai-to)'}], caps:['Room management & spaces','Client portal & tasks'] },\n      { label:'Proposal', icon:'📄', title:'Send proposals clients can act on', desc:'Build visual proposals with ClientCart-style selling — clients pick packages and add-ons themselves.', metric:'$14,200', metricLabel:'Average proposal value', rows:[{t:'Harper & Wells · Premium package', s:'Sent · viewed 3×', dot:'var(--green)'},{t:'Avery T. · Gala buildout', s:'Draft', dot:'var(--amber)'}], caps:['Proposals & ClientCart selling','Email & SMS communication'] },\n      { label:'Contract', icon:'✍️', title:'Close with built-in e-signatures', desc:'Generate contracts and collect signatures without leaving Releventful — no extra tools.', metric:'92%', metricLabel:'Signed within 48 hours', rows:[{t:'Harper & Wells · Venue agreement', s:'Signed Aug 2', dot:'var(--green)'},{t:'Morgan K. · Holiday party', s:'Awaiting signature', dot:'var(--amber)'}], caps:['Contracts & e-signatures'] },\n      { label:'Deposit', icon:'💳', title:'Collect deposits and payments', desc:'Deposits, payment schedules, ACH and card payments — all tracked automatically against the event.', metric:'$8,400', metricLabel:'Outstanding · Harper & Wells', rows:[{t:'Deposit · $4,200', s:'Paid Aug 3', dot:'var(--green)'},{t:'Installment 2 · $4,200', s:'Due Aug 30', dot:'var(--amber)'}], caps:['Invoices, deposits, ACH & card'] },\n      { label:'Planning', icon:'📋', title:'Keep planning details in one place', desc:'Planning forms, documents, tasks and inventory live with the event — clients fill in their own details.', metric:'6 / 9', metricLabel:'Planning tasks complete', rows:[{t:'Final headcount form', s:'Due in 7 days', dot:'var(--amber)'},{t:'Linens & décor inventory', s:'Reserved', dot:'var(--green)'}], caps:['Client portal, forms & tasks','Inventory & resources'] },\n      { label:'BEO', icon:'🗂️', title:'Build BEOs and event timelines', desc:'Banquet event orders, timelines and event-day notes stay current and shared across your team.', metric:'v4', metricLabel:'Current BEO revision', rows:[{t:'Reception timeline', s:'Updated 1d ago', dot:'var(--ai-to)'},{t:'Kitchen BEO · 220 covers', s:'In review', dot:'var(--amber)'}], caps:['BEOs, timelines & details','Room management & spaces'] },\n      { label:'Event day', icon:'🎉', title:'Run the day with your team', desc:'Staff schedules, team tasks and mobile access keep everyone aligned when it matters most.', metric:'6', metricLabel:'Staff assigned · 1 role open', rows:[{t:'Bar team · 2 assigned', s:'Needs 1 bartender', dot:'var(--amber)'},{t:'Setup crew · 4 assigned', s:'Confirmed', dot:'var(--green)'}], caps:['Employee scheduling & mobile'] },\n      { label:'Reporting', icon:'📊', title:'See the business clearly', desc:'Reporting, business intelligence and AI-powered insights across every event, lead, and dollar.', metric:'$184k', metricLabel:'Revenue booked · ▲ 12%', rows:[{t:'Lead-to-tour rate', s:'38% · ▲ 4 pts', dot:'var(--green)'},{t:'Overdue invoices', s:'3 · $9,800', dot:'var(--red)'}], caps:['Reporting, BI & AI insights'] },\n    ];\n    const si = Math.min(this.state.stage, stageData.length - 1);\n    const stages = stageData.map((s, i) => {\n      return { ...s, active: si === i, onClick: () => this.setState({ stage: i }) };\n    });\n    const active = stageData[si];\n    return {\n      heroA: v === 'Split composite',\n      heroB: v === 'Product-forward',\n      heroC: v === 'Editorial',\n      faqList, stages, active,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
